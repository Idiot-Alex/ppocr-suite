services:
  ppocr-api:
    build: .
    container_name: ppocr-api
    ports:
      - "8000:8000"
    environment:
      APP_ENV: prod
      API_KEYS: ppocr-dev-7c9f2b8a6e1d4c30
      OCR_LANG: ch
      OCR_PRELOAD_ON_STARTUP: "true"
      OCR_INCLUDE_RAW_BY_DEFAULT: "false"
      MAX_UPLOAD_SIZE_MB: 10
    restart: unless-stopped
