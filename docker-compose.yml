services:
  ppocr-api:
    build: .
    container_name: ppocr-api
    ports:
      - "8000:8000"
    environment:
      APP_ENV: prod
      API_KEY: change-me
      OCR_LANG: ch
      OCR_MODEL_SIZE: tiny
      OCR_USE_GPU: "false"
      OCR_PRELOAD_ON_STARTUP: "true"
      MAX_UPLOAD_SIZE_MB: 10
    restart: unless-stopped
