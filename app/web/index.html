<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PP-OCRv6 API Workbench</title>
    <script>
      tailwind = {
        config: {
          darkMode: "media",
          theme: {
            extend: {
              fontFamily: {
                sans: [
                  "ui-sans-serif",
                  "system-ui",
                  "-apple-system",
                  "BlinkMacSystemFont",
                  "Segoe UI",
                  "sans-serif",
                ],
                mono: ["ui-monospace", "SFMono-Regular", "Menlo", "Consolas", "monospace"],
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="min-h-[100dvh] bg-[#edf2f3] text-slate-950 antialiased dark:bg-zinc-950 dark:text-zinc-100">
    <main class="mx-auto flex min-h-[100dvh] w-full max-w-[1520px] flex-col px-4 py-4 sm:px-5 lg:px-6">
      <header class="mb-4 grid gap-4 rounded-lg border border-slate-200/80 bg-white/82 p-3 shadow-[0_16px_60px_rgba(15,23,42,0.08)] backdrop-blur lg:grid-cols-[minmax(220px,0.55fr)_minmax(620px,1fr)] lg:items-end dark:border-zinc-800 dark:bg-zinc-900/82 dark:shadow-none">
        <div class="min-w-0 px-1 py-1">
          <p class="mb-1 font-mono text-[11px] font-semibold uppercase tracking-[0.16em] text-emerald-700 dark:text-emerald-400">
            PP-OCRv6 API
          </p>
          <h1 class="text-2xl font-semibold tracking-normal text-slate-950 sm:text-3xl dark:text-zinc-50">
            OCR Workbench
          </h1>
        </div>

        <form class="grid gap-2 sm:grid-cols-[minmax(180px,0.9fr)_minmax(220px,1fr)_112px]" id="ocr-form">
          <label class="field">
            <span>API Key</span>
            <input
              id="api-key"
              name="apiKey"
              type="password"
              autocomplete="off"
              value="ppocr-dev-7c9f2b8a6e1d4c30"
            />
          </label>
          <label class="field file-field">
            <span>Image</span>
            <input id="file-input" name="file" type="file" accept="image/*" />
          </label>
          <button
            class="primary-button"
            id="submit-button"
            type="submit"
          >
            Analyze
          </button>
        </form>
      </header>

      <section class="grid flex-1 gap-4 lg:grid-cols-[minmax(0,1.45fr)_minmax(360px,0.72fr)]">
        <section
          class="image-panel min-w-0 overflow-hidden rounded-lg border border-slate-200/90 bg-white shadow-[0_22px_70px_rgba(15,23,42,0.10)] dark:border-zinc-800 dark:bg-zinc-900 dark:shadow-none"
          aria-label="Uploaded image preview"
        >
          <div class="panel-head">
            <div class="min-w-0">
              <h2>Image</h2>
              <p id="image-meta">No image selected</p>
            </div>
            <span class="status" id="status">Idle</span>
          </div>
          <div class="preview-wrap" id="preview-wrap">
            <div class="empty-state" id="empty-state">
              <span class="empty-mark" aria-hidden="true"></span>
              <strong>Drop in a document image</strong>
              <span>Use the file selector, then run OCR.</span>
            </div>
            <img id="preview-image" alt="Uploaded preview" hidden />
            <div class="overlay" id="overlay" aria-hidden="true"></div>
          </div>
        </section>

        <aside
          class="result-panel min-w-0 overflow-hidden rounded-lg border border-slate-200/90 bg-white shadow-[0_22px_70px_rgba(15,23,42,0.10)] dark:border-zinc-800 dark:bg-zinc-900 dark:shadow-none"
          aria-label="OCR result"
        >
          <div class="panel-head">
            <div class="min-w-0">
              <h2>Result</h2>
              <p id="result-meta">Waiting for analysis</p>
            </div>
            <button class="secondary-button" id="clear-button" type="button">Clear</button>
          </div>
          <div class="error-box" id="error-box" hidden></div>
          <div class="text-summary" id="text-summary" hidden>
            <h3>Full Text</h3>
            <pre id="full-text"></pre>
          </div>
          <ol class="result-list" id="result-list"></ol>
        </aside>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
