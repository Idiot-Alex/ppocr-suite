<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PP-OCRv6 API Workbench</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">PP-OCRv6 API</p>
          <h1>OCR Workbench</h1>
        </div>
        <form class="controls" id="ocr-form">
          <label class="field">
            <span>API Key</span>
            <input
              id="api-key"
              name="apiKey"
              type="password"
              autocomplete="off"
              value="ppocr-dev-7c9f2b8a6e1d4c30"
            />
          </label>
          <label class="field file-field">
            <span>Image</span>
            <input id="file-input" name="file" type="file" accept="image/*" />
          </label>
          <button class="primary-button" id="submit-button" type="submit">Analyze</button>
        </form>
      </header>

      <section class="workspace">
        <section class="image-panel" aria-label="Uploaded image preview">
          <div class="panel-head">
            <div>
              <h2>Image</h2>
              <p id="image-meta">No image selected</p>
            </div>
            <span class="status" id="status">Idle</span>
          </div>
          <div class="preview-wrap" id="preview-wrap">
            <div class="empty-state" id="empty-state">
              <strong>Drop in a document image</strong>
              <span>Use the file selector above, then run OCR.</span>
            </div>
            <img id="preview-image" alt="Uploaded preview" hidden />
            <div class="overlay" id="overlay" aria-hidden="true"></div>
          </div>
        </section>

        <aside class="result-panel" aria-label="OCR result">
          <div class="panel-head">
            <div>
              <h2>Result</h2>
              <p id="result-meta">Waiting for analysis</p>
            </div>
            <button class="secondary-button" id="clear-button" type="button">Clear</button>
          </div>
          <div class="error-box" id="error-box" hidden></div>
          <div class="text-summary" id="text-summary" hidden>
            <h3>Full Text</h3>
            <pre id="full-text"></pre>
          </div>
          <ol class="result-list" id="result-list"></ol>
        </aside>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
